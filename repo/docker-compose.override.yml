services:
  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
      args:
        VITE_API_BASE_PATH: ${VITE_API_BASE_PATH:-/api/v1}
        VITE_BACKEND_ORIGIN: ${VITE_BACKEND_ORIGIN:-http://backend:8000}
    environment:
      VITE_API_BASE_PATH: ${VITE_API_BASE_PATH:-/api/v1}
      VITE_BACKEND_ORIGIN: ${VITE_BACKEND_ORIGIN:-http://backend:8000}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - vetops_frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vetops_internal
      - vetops_edge
